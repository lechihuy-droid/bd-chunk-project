tool_profiles:
  read_only:
    allowed:
      - Read
      - Grep
    disallowed:
      - Bash
      - Write
      - WebFetch

  orchestration:
    allowed:
      - route_task
      - read_pipeline_state
      - write_job_summary
    disallowed:
      - parse_excel_range
      - write_bd_patch

  read_write_registry:
    allowed:
      - hash_file
      - detect_file_type
      - register_file
      - write_jsonl
    constraints:
      only_write_under:
        - data/index/

  excel_parse_only:
    allowed:
      - parse_excel_range
      - validate_source_units
      - write_jsonl
      - write_exceptions
    constraints:
      only_write_under:
        - data/outputs/
      required_output_files:
        - data/outputs/source_units.jsonl
        - data/outputs/exceptions.jsonl

  validation_only:
    allowed:
      - validate_source_units
      - validate_traceable_chunks
      - write_exceptions
    constraints:
      only_write_under:
        - data/outputs/
      forbidden_outputs:
        - data/outputs/rkb_items.jsonl
        - data/outputs/bd_mapping.jsonl
        - data/outputs/bd_patch_ja.md

  chunk_write:
    allowed:
      - build_traceable_chunks
      - detect_multi_behavior
      - detect_ambiguity_terms
      - write_jsonl
      - write_exceptions
    constraints:
      only_write_under:
        - data/outputs/
      required_output_files:
        - data/outputs/traceable_chunks.jsonl

  label_only:
    allowed:
      - load_ontology_yaml
      - apply_ontology_rules
      - validate_ontology_labels
      - write_jsonl
    constraints:
      only_read_under:
        - ontology/
        - data/outputs/
      only_write_under:
        - data/outputs/
      forbidden_actions:
        - invent_new_label
        - approve_pending_decision

  review_only:
    allowed:
      - read_rkb_candidates
      - write_review_summary
      - apply_human_decisions
      - write_jsonl
    disallowed:
      - Bash
      - WebFetch
    constraints:
      only_write_under:
        - data/outputs/

  bd_generation:
    allowed:
      - read_rkb_items
      - read_bd_mapping
      - write_bd_patch
    constraints:
      only_write_under:
        - data/outputs/
      forbidden_inputs:
        - data/raw/
