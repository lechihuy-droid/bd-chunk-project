skills:
  - id: ingest-excel-source
    command_name: ingest-excel-source
    description: >
      Parse registered Excel QA/RD files into traceable source units.
      Use when the user asks to ingest Excel, parse QA票, or create source_units.jsonl.
    stage: ingest
    invocation: manual_or_auto
    paths:
      - "data/raw/**/*.xlsx"
      - "src/bd_chunk/ingest/**"
    allowed_tools:
      - Read
      - Bash
      - Write
    disallowed_tools:
      - WebFetch
    prompt_template: skill.md.j2
    supporting_files:
      - examples/source_unit.example.json
      - scripts/validate_source_units.sh

  - id: build-traceable-chunks
    command_name: build-traceable-chunks
    description: >
      Convert validated source_units.jsonl into traceable_chunks.jsonl with deterministic chunk IDs,
      content hashes, normalized text, source references, and ambiguity flags.
    stage: chunking
    invocation: manual_or_auto
    paths:
      - "data/outputs/source_units.jsonl"
      - "src/bd_chunk/chunking/**"
    allowed_tools:
      - Read
      - Bash
      - Write
    disallowed_tools:
      - WebFetch
    prompt_template: skill.md.j2

  - id: detect-ambiguity-terms
    command_name: detect-ambiguity-terms
    description: >
      Detect ambiguous Japanese requirement terms such as 別途確認, 未定, 必要に応じて, 適切に,
      原則として, できるだけ, なるべく, and mark items as Needs Review.
    stage: chunking
    invocation: manual_or_auto
    paths:
      - "data/outputs/traceable_chunks.jsonl"
    allowed_tools:
      - Read
      - Write
    disallowed_tools:
      - Bash
      - WebFetch
    prompt_template: skill.md.j2

  - id: label-ontology
    command_name: label-ontology
    description: >
      Apply controlled ontology labels to traceable chunks using ontology YAML files.
      Use before creating RKB candidates.
    stage: rkb
    invocation: manual_or_auto
    paths:
      - "ontology/**"
      - "data/outputs/traceable_chunks.jsonl"
    allowed_tools:
      - Read
      - Bash
      - Write
    disallowed_tools:
      - WebFetch
    prompt_template: skill.md.j2

  - id: normalize-ears-ja
    command_name: normalize-ears-ja
    description: >
      Normalize Japanese behavior requirements into EARS-like structured requirement statements.
      Use only after traceability validation and ontology labeling.
    stage: rkb
    invocation: manual_or_auto
    paths:
      - "data/outputs/rkb_candidates.jsonl"
    allowed_tools:
      - Read
      - Write
    disallowed_tools:
      - Bash
      - WebFetch
    prompt_template: skill.md.j2

  - id: review-rkb-candidates
    command_name: review-rkb-candidates
    description: >
      Review RKB candidates and summarize Ready, Needs Review, Pending, Conflict,
      and Exception items before BD mapping.
    stage: review
    invocation: manual_only
    paths:
      - "data/outputs/rkb_candidates.jsonl"
      - "data/outputs/exceptions.jsonl"
    allowed_tools:
      - Read
      - Write
    disallowed_tools:
      - Bash
      - WebFetch
    prompt_template: skill.md.j2

  - id: build-bm25-index
    command_name: build-bm25-index
    description: >
      Build a BM25 keyword index from RKB items for exact Japanese keyword, field, status,
      and ID retrieval. BM25 retrieves candidates and must not decide BD mapping.
    stage: indexing
    invocation: manual_or_auto
    paths:
      - "data/outputs/rkb_items.jsonl"
      - "data/index/**"
    allowed_tools:
      - Read
      - Bash
      - Write
    disallowed_tools:
      - WebFetch
    prompt_template: skill.md.j2

  - id: build-semantic-manifest
    command_name: build-semantic-manifest
    description: >
      Create a semantic index manifest with text_for_embedding and embedding_status.
      Use before adding a real vector DB or embedding service.
    stage: indexing
    invocation: manual_or_auto
    paths:
      - "data/outputs/rkb_items.jsonl"
      - "data/index/**"
    allowed_tools:
      - Read
      - Bash
      - Write
    disallowed_tools:
      - WebFetch
    prompt_template: skill.md.j2
