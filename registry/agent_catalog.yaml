agents:
  - id: orchestrator_agent
    name: OrchestratorAgent
    stage: orchestration
    role: Coordinate the BD chunk pipeline and route tasks to specialist agents.
    mission: Receive user or CLI jobs, check required inputs, call specialist agents, stop on validation failure, and return review summaries.
    prompt_template: agent_prompt.md.j2
    tool_profile: orchestration
    allowed_tools:
      - route_task
      - read_pipeline_state
      - write_job_summary
    forbidden_actions:
      - parse_files_directly
      - invent_source_metadata
      - auto_approve_rkb_items
      - generate_bd_patch
    output_schema: OrchestratorResult
    eval_cases:
      - evals/orchestrator_basic.yaml

  - id: file_registry_agent
    name: FileRegistryAgent
    stage: ingest
    role: Register raw files and compute deterministic file metadata.
    mission: Convert raw file paths into file registry records with file hash, source kind, and parser hint.
    prompt_template: agent_prompt.md.j2
    tool_profile: read_write_registry
    allowed_tools:
      - hash_file
      - detect_file_type
      - register_file
      - write_jsonl
    forbidden_actions:
      - infer_file_hash
      - parse_requirement
      - create_rkb_item
      - create_bd_mapping
    output_schema: FileRegistryResult
    eval_cases:
      - evals/file_registry_basic.yaml

  - id: excel_source_parser_agent
    name: ExcelSourceParserAgent
    stage: ingest
    role: Parse Excel QA/RD sheets into traceable source units.
    mission: Create source_units.jsonl with workbook, sheet, range, and raw text.
    prompt_template: agent_prompt.md.j2
    tool_profile: excel_parse_only
    allowed_tools:
      - parse_excel_range
      - validate_source_units
      - write_jsonl
      - write_exceptions
    forbidden_actions:
      - infer_sheet_name
      - infer_range_a1
      - classify_requirement_type
      - create_bd_mapping
    output_schema: SourceUnitsResult
    eval_cases:
      - evals/excel_parser_traceability.yaml

  - id: traceability_validator_agent
    name: TraceabilityValidatorAgent
    stage: validation
    role: Validate source units and chunks before downstream processing.
    mission: Block invalid or untraceable items and write exceptions with clear reasons.
    prompt_template: agent_prompt.md.j2
    tool_profile: validation_only
    allowed_tools:
      - validate_source_units
      - validate_traceable_chunks
      - write_exceptions
    forbidden_actions:
      - repair_missing_provenance_by_guessing
      - approve_invalid_items
      - generate_requirement_text
      - create_bd_mapping
    output_schema: TraceabilityValidationResult
    eval_cases:
      - evals/traceability_missing_range.yaml

  - id: chunk_builder_agent
    name: ChunkBuilderAgent
    stage: chunking
    role: Convert valid source units into traceable chunks.
    mission: Normalize source text without inventing facts, create deterministic chunk IDs, compute content hashes, and preserve source references.
    prompt_template: agent_prompt.md.j2
    tool_profile: chunk_write
    allowed_tools:
      - build_traceable_chunks
      - detect_multi_behavior
      - detect_ambiguity_terms
      - write_jsonl
      - write_exceptions
    forbidden_actions:
      - create_rkb_item_directly
      - map_bd_frame
      - remove_uncertainty_silently
    output_schema: TraceableChunksResult
    eval_cases:
      - evals/chunk_builder_basic.yaml

  - id: ontology_labeler_agent
    name: OntologyLabelerAgent
    stage: rkb
    role: Apply controlled ontology labels to traceable chunks.
    mission: Label chunks using ontology YAML and never invent new labels.
    prompt_template: agent_prompt.md.j2
    tool_profile: label_only
    allowed_tools:
      - load_ontology_yaml
      - apply_ontology_rules
      - validate_ontology_labels
      - write_jsonl
    forbidden_actions:
      - invent_new_label
      - approve_pending_decision
      - create_bd_patch
    output_schema: OntologyLabelingResult
    eval_cases:
      - evals/ontology_labeling_controlled.yaml

  - id: rkb_reviewer_agent
    name: RKBReviewerAgent
    stage: review
    role: Prepare RKB candidate review and promote approved items to RKB-ready status.
    mission: Summarize Ready, Needs Review, Pending, Conflict, and Exception items for the BD creator.
    prompt_template: agent_prompt.md.j2
    tool_profile: review_only
    allowed_tools:
      - read_rkb_candidates
      - write_review_summary
      - apply_human_decisions
      - write_jsonl
    forbidden_actions:
      - auto_approve_pending_decision
      - auto_resolve_source_conflict
      - generate_bd_patch
    output_schema: RKBReviewResult
    eval_cases:
      - evals/rkb_review_pending_blocked.yaml
