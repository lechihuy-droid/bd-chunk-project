capabilities:
  - id: register_files
    layer: L4_capability
    type: deterministic_tool
    role: register_raw_project_files_and_create_file_records

  - id: parse_excel
    layer: L4_capability
    type: deterministic_tool
    role: parse_excel_workbooks_with_sheet_row_cell_traceability

  - id: parse_pdf
    layer: L4_capability
    type: tool_adapter
    implementation: opendataloader_pdf
    source: https://github.com/opendataloader-project/opendataloader-pdf
    role: parse_pdf_documents_into_structured_source_units_with_page_and_layout_traceability
    expose_as:
      - pdf.parse
      - pdf.extract_structure
      - pdf.extract_tables
      - pdf.extract_images
      - pdf.render_page
      - pdf.validate_output
    required_outputs:
      - document_id
      - page_number
      - element_type
      - reading_order
      - text
      - bounding_box
      - source_hash
    adoption_note: >-
      Use OpenDataLoader PDF behind a stable PDF Capability API. Preserve page numbers,
      element types, reading order, bounding boxes, and source hashes before chunk creation.
      The adapter may emit Markdown or structured JSON, but downstream BD workflows must
      consume normalized source units rather than vendor-specific output directly.
    use_for_bd_harness: >-
      Use for RD, specification, QA, meeting-material, legacy-reference, and scanned PDF
      ingestion when layout-aware extraction is required. Feed validated source units into
      build_chunks so every chunk can retain document, page, element, and coordinate provenance.
    integration_rule: >-
      Do not allow parser output to bypass file registration, provenance locking, schema
      normalization, or extraction validation. OCR-derived text must be marked with extraction
      method and confidence when those fields are available.
    not_for: excel_cell_level_parsing_or_direct_llm_generation_from_raw_pdf

  - id: build_chunks
    layer: L4_capability
    type: deterministic_tool
    role: build_traceable_chunks_from_source_units

  - id: validate_chunks
    layer: L4_capability
    type: validator
    role: validate_chunk_provenance_boundaries_and_required_fields

  - id: label_ontology
    layer: L4_capability
    type: controlled_labeling_skill
    role: apply_requirement_type_source_type_and_bd_frame_labels

  - id: promote_rkb
    layer: L4_capability
    type: workflow_skill
    role: promote_validated_chunks_into_requirement_knowledge_base_items

  - id: build_bm25
    layer: L4_capability
    type: retrieval_tool
    role: build_keyword_index_for_traceable_requirement_lookup

  - id: map_bd
    layer: L4_capability
    type: mapping_skill
    role: map_requirement_knowledge_base_items_to_basic_design_frames

  - id: generate_bd_patch
    layer: L4_capability
    type: generation_skill
    role: generate_reviewable_japanese_basic_design_patch_with_citations

  - id: methodology_skill_library
    layer: L4_capability
    type: skill_library_pattern
    source: https://github.com/obra/Superpowers
    role: reusable_methodology_skills_for_planning_review_execution_and_delivery
    adoption_note: >-
      Treat Superpowers-style skills as capability assets in L4, together with tools,
      templates, prompts, commands, and knowledge packs. Do not keep the skill asset
      itself in L5. L5 should only contain the control mechanisms that select,
      enforce, evaluate, or block a skill during execution.

  - id: office_document_engine
    layer: L4_capability
    type: tool_adapter
    source: https://github.com/iOfficeAI/OfficeCLI
    role: agent_first_office_document_automation_for_word_excel_and_powerpoint
    expose_as:
      - office.read
      - office.query
      - office.create
      - office.update
      - office.replace
      - office.insert_table
      - office.insert_chart
      - office.insert_image
      - office.render
      - office.preview
      - office.dump
      - office.validate
      - office.batch
    adoption_note: >-
      Treat OfficeCLI as an implementation behind an Office Capability API, not as
      direct prompt-level CLI commands. The BD Harness should call stable capabilities
      such as render_preview, dump_structure, update_sheet, insert_table, and validate_layout,
      while the adapter maps those calls to OfficeCLI. This keeps workflows portable if
      the implementation is later replaced by Microsoft Graph, LibreOffice, or custom SDKs.
    use_for_bd_harness: >-
      Use for generating, updating, rendering, reviewing, and validating client-facing
      Word, Excel, and PowerPoint artifacts. Especially useful for a closed feedback loop:
      edit document, render to HTML or PNG, review the visual result, fix layout/content,
      then produce a reviewable delivery pack.
    not_for: high_volume_excel_etl_or_dataframe_processing

reference_sources:
  - id: superpowers
    name: Superpowers
    repository: https://github.com/obra/Superpowers
    layer: L4_capability
    category: methodology_as_code_skill_library
    use_for_bd_harness: >-
      Adapt the small reusable skill pattern into BD-specific skills such as
      analyze_rd, build_traceable_chunks, validate_rcd, map_bd_frame,
      review_basic_design, and generate_client_ready_patch.
    not_for: runtime_orchestration_agentops_or_observability

  - id: opendataloader_pdf
    name: OpenDataLoader PDF
    repository: https://github.com/opendataloader-project/opendataloader-pdf
    layer: L4_capability
    category: layout_aware_pdf_ingestion_adapter
    install_priority: core_candidate
    use_for_bd_harness: >-
      Add as the preferred candidate for layout-aware PDF ingestion before traceable
      chunk construction. Evaluate it on Japanese digital PDFs, scanned documents,
      complex tables, multi-column layouts, and hidden-text cases using the project's
      golden document set before making it the production default.
    integration_rule: >-
      Wrap it behind pdf.parse and normalize its output into the project source-unit
      schema. Persist document hash, page number, reading order, element type, and
      bounding box whenever available so provenance remains independent of the parser.
    not_for: replacing_excel_parser_chunk_validator_or_bd_mapping_logic

  - id: officecli
    name: OfficeCLI
    repository: https://github.com/iOfficeAI/OfficeCLI
    releases: https://github.com/iOfficeAI/OfficeCLI/releases
    layer: L4_capability
    category: office_document_tool_adapter
    use_for_bd_harness: >-
      Add as a notable harness tool for Office artifact automation. It is useful when
      the agent must create or modify Office documents and then render/review the result
      before final delivery.
    integration_rule: >-
      Do not expose raw OfficeCLI commands directly to application agents. Wrap them in
      the Office Capability API and keep command syntax inside the adapter layer.
    not_for: direct_replacement_of_all_excel_batch_processing_or_project_governance