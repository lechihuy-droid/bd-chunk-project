capabilities:
  - id: register_files
    layer: L4_capability
    type: deterministic_tool
    role: register_raw_project_files_and_create_file_records

  - id: parse_excel
    layer: L4_capability
    type: deterministic_tool
    role: parse_excel_workbooks_with_sheet_row_cell_traceability

  - id: parse_pdf
    layer: L4_capability
    type: tool_adapter
    implementation: opendataloader_pdf
    source: https://github.com/opendataloader-project/opendataloader-pdf
    role: parse_pdf_documents_into_structured_source_units_with_page_and_layout_traceability
    expose_as:
      - pdf.parse
      - pdf.extract_structure
      - pdf.extract_tables
      - pdf.extract_images
      - pdf.render_page
      - pdf.validate_output
    required_outputs:
      - document_id
      - page_number
      - element_type
      - reading_order
      - text
      - bounding_box
      - source_hash
    adoption_note: >-
      Use OpenDataLoader PDF behind a stable PDF Capability API. Preserve page numbers,
      element types, reading order, bounding boxes, and source hashes before chunk creation.
      The adapter may emit Markdown or structured JSON, but downstream BD workflows must
      consume normalized source units rather than vendor-specific output directly.
    use_for_bd_harness: >-
      Use for RD, specification, QA, meeting-material, legacy-reference, and scanned PDF
      ingestion when layout-aware extraction is required. Feed validated source units into
      build_chunks so every chunk can retain document, page, element, and coordinate provenance.
    integration_rule: >-
      Do not allow parser output to bypass file registration, provenance locking, schema
      normalization, or extraction validation. OCR-derived text must be marked with extraction
      method and confidence when those fields are available.
    not_for: excel_cell_level_parsing_or_direct_llm_generation_from_raw_pdf

  - id: build_chunks
    layer: L4_capability
    type: deterministic_tool
    role: build_traceable_chunks_from_source_units

  - id: validate_chunks
    layer: L4_capability
    type: validator
    role: validate_chunk_provenance_boundaries_and_required_fields

  - id: label_ontology
    layer: L4_capability
    type: controlled_labeling_skill
    role: apply_requirement_type_source_type_and_bd_frame_labels

  - id: promote_rkb
    layer: L4_capability
    type: workflow_skill
    role: promote_validated_chunks_into_requirement_knowledge_base_items

  - id: build_bm25
    layer: L4_capability
    type: retrieval_tool
    role: build_keyword_index_for_traceable_requirement_lookup

  - id: map_bd
    layer: L4_capability
    type: mapping_skill
    role: map_requirement_knowledge_base_items_to_basic_design_frames

  - id: generate_bd_patch
    layer: L4_capability
    type: generation_skill
    role: generate_reviewable_japanese_basic_design_patch_with_citations

  - id: methodology_skill_library
    layer: L4_capability
    type: skill_library_pattern
    source: https://github.com/obra/Superpowers
    role: reusable_methodology_skills_for_planning_review_execution_and_delivery
    adoption_note: >-
      Treat Superpowers-style skills as capability assets in L4, together with tools,
      templates, prompts, commands, and knowledge packs. Do not keep the skill asset
      itself in L5. L5 should only contain the control mechanisms that select,
      enforce, evaluate, or block a skill during execution.

  - id: official_claude_skill_pattern_library
    layer: L4_capability
    type: small_skill_pattern_library
    implementation: claude_cookbooks
    source: https://github.com/anthropics/claude-cookbooks
    role: official_anthropic_source_for_small_reusable_agent_tool_and_evaluation_patterns
    adoption_mode: extract_review_and_adapt
    install_required: false
    runtime_dependency: false
    recommended_for:
      - tool_use_patterns
      - human_in_the_loop_skill
      - outcome_grader_skill
      - prompt_versioning_skill
      - memory_handling_pattern
      - multi_agent_coordination_pattern
      - plan_big_execute_small_pattern
      - agent_evaluation_pattern
    adoption_note: >-
      Treat each cookbook recipe as a small capability or skill pattern that may be adapted
      into a BD-specific SKILL.md, validator, evaluator, or workflow step. Do not treat the
      repository as a separate architecture layer, monolithic framework, or runtime dependency.
    integration_rule: >-
      Prefer Anthropic's official behavior and API patterns when they conflict with community
      examples, but rewrite every adopted recipe for BD contracts, provenance, traceability,
      versioning, evaluation, and human review before registration.
    not_for: direct_notebook_copy_into_production_or_top_level_harness_architecture

  - id: external_skill_tool_library
    layer: L4_capability
    type: selective_reference_library
    implementation: ecc
    source: https://github.com/affaan-m/ECC
    former_name: Everything Claude Code
    role: cross_harness_source_for_reusable_skills_tools_hooks_rules_agents_and_mcp_patterns
    adoption_mode: selective_extract_review_and_adapt
    install_required: false
    runtime_dependency: false
    recommended_for:
      - skill_registry_and_discovery
      - selective_installation_manifests
      - verification_and_grader_loops
      - planner_reviewer_separation
      - session_handoff_and_decision_ledgers
      - cross_harness_adapter_design
      - continuous_learning_with_promotion_gate
      - security_review_of_skills_hooks_and_mcp
    adoption_note: >-
      Treat ECC as an external capability library and reference implementation, not as a
      monolithic dependency. Import only relevant assets after relevance review, security
      review, BD-domain rewriting, contract definition, evaluation, and human approval.
    integration_rule: >-
      Registered ECC-derived skills and tools must use BD-specific input and output contracts,
      preserve provenance, remain versioned, and stay subject to the same governance gates as
      native capabilities. Hooks and MCP profiles must be allowlisted and reviewed before use.
    restrictions:
      - do_not_bulk_install_all_skills
      - do_not_enable_hooks_without_security_review
      - do_not_use_agent_memory_as_requirement_source_of_truth
      - do_not_allow_external_assets_to_bypass_bd_governance
      - add_bd_specific_evaluations_before_adoption
    risk_level: medium_high_if_bulk_installed

  - id: office_document_engine
    layer: L4_capability
    type: tool_adapter
    source: https://github.com/iOfficeAI/OfficeCLI
    role: agent_first_office_document_automation_for_word_excel_and_powerpoint
    expose_as:
      - office.read
      - office.query
      - office.create
      - office.update
      - office.replace
      - office.insert_table
      - office.insert_chart
      - office.insert_image
      - office.render
      - office.preview
      - office.dump
      - office.validate
      - office.batch
    adoption_note: >-
      Treat OfficeCLI as an implementation behind an Office Capability API, not as
      direct prompt-level CLI commands. The BD Harness should call stable capabilities
      such as render_preview, dump_structure, update_sheet, insert_table, and validate_layout,
      while the adapter maps those calls to OfficeCLI. This keeps workflows portable if
      the implementation is later replaced by Microsoft Graph, LibreOffice, or custom SDKs.
    use_for_bd_harness: >-
      Use for generating, updating, rendering, reviewing, and validating client-facing
      Word, Excel, and PowerPoint artifacts. Especially useful for a closed feedback loop:
      edit document, render to HTML or PNG, review the visual result, fix layout/content,
      then produce a reviewable delivery pack.
    not_for: high_volume_excel_etl_or_dataframe_processing

reference_sources:
  - id: superpowers
    name: Superpowers
    repository: https://github.com/obra/Superpowers
    layer: L4_capability
    category: methodology_as_code_skill_library
    use_for_bd_harness: >-
      Adapt the small reusable skill pattern into BD-specific skills such as
      analyze_rd, build_traceable_chunks, validate_rcd, map_bd_frame,
      review_basic_design, and generate_client_ready_patch.
    not_for: runtime_orchestration_agentops_or_observability

  - id: claude_cookbooks
    name: Claude Cookbooks
    repository: https://github.com/anthropics/claude-cookbooks
    layer: L4_capability
    category: official_small_skill_and_agent_pattern_library
    priority: official_reference
    install_required: false
    runtime_dependency: false
    use_for_bd_harness: >-
      Use individual cookbook recipes as official Anthropic references for small reusable
      skills and capability patterns such as tool use, human approval, graders, prompt
      versioning, memory handling, multi-agent coordination, and evaluation loops.
    adoption_process: >-
      Select one recipe, rewrite it for a narrow BD use case, define its input and output
      contract, add provenance and evaluation requirements, test it, obtain human approval,
      and then register it as a versioned BD capability.
    integration_rule: >-
      Keep cookbook-derived assets inside L4 as small skills, validators, evaluators, or
      workflow steps. Do not elevate the repository into a separate Harness layer and do not
      copy notebooks directly into production code.
    not_for: monolithic_runtime_dependency_or_top_level_architecture_layer

  - id: ecc
    name: ECC
    former_name: Everything Claude Code
    repository: https://github.com/affaan-m/ECC
    layer: L4_capability
    category: cross_harness_skill_and_tool_pattern_library
    install_priority: optional_selective
    install_required: false
    runtime_dependency: false
    use_for_bd_harness: >-
      Use as a source for selectively adapting skill registry, discovery, installer manifest,
      verification loop, session handoff, decision ledger, cross-harness adapter, continuous
      learning, security review, hook, rule, agent, tool, and MCP patterns into BD-specific assets.
    adoption_process: >-
      Review relevance, inspect security-sensitive scripts and permissions, rewrite for BD,
      define stable contracts, add provenance and evaluation requirements, obtain human approval,
      then register the adopted asset in this catalog with an explicit owner and version.
    integration_rule: >-
      Do not vendor or activate the full distribution by default. All imported assets must be
      allowlisted, version-pinned, testable, and prevented from bypassing source registration,
      traceability validation, ontology control, human review, or delivery governance.
    not_for: monolithic_runtime_dependency_or_unreviewed_bulk_installation

  - id: opendataloader_pdf
    name: OpenDataLoader PDF
    repository: https://github.com/opendataloader-project/opendataloader-pdf
    layer: L4_capability
    category: layout_aware_pdf_ingestion_adapter
    install_priority: core_candidate
    use_for_bd_harness: >-
      Add as the preferred candidate for layout-aware PDF ingestion before traceable
      chunk construction. Evaluate it on Japanese digital PDFs, scanned documents,
      complex tables, multi-column layouts, and hidden-text cases using the project's
      golden document set before making it the production default.
    integration_rule: >-
      Wrap it behind pdf.parse and normalize its output into the project source-unit
      schema. Persist document hash, page number, reading order, element type, and
      bounding box whenever available so provenance remains independent of the parser.
    not_for: replacing_excel_parser_chunk_validator_or_bd_mapping_logic

  - id: officecli
    name: OfficeCLI
    repository: https://github.com/iOfficeAI/OfficeCLI
    releases: https://github.com/iOfficeAI/OfficeCLI/releases
    layer: L4_capability
    category: office_document_tool_adapter
    use_for_bd_harness: >-
      Add as a notable harness tool for Office artifact automation. It is useful when
      the agent must create or modify Office documents and then render/review the result
      before final delivery.
    integration_rule: >-
      Do not expose raw OfficeCLI commands directly to application agents. Wrap them in
      the Office Capability API and keep command syntax inside the adapter layer.
    not_for: direct_replacement_of_all_excel_batch_processing_or_project_governance

  - id: learn_claude_code
    name: Learn Claude Code
    repository: https://github.com/shareAI-lab/learn-claude-code
    layer: L4_capability
    category: harness_engineering_learning_reference
    install_priority: learning_reference
    install_required: false
    runtime_dependency: false
    use_for_bd_harness: >-
      Use as a progressive learning and architecture reference for building agent harness
      mechanisms: agent loop, tool dispatch, permission gates, hooks, planning, subagents,
      on-demand skill loading, context compaction, memory, error recovery, task DAGs,
      background execution, agent teams, worktree isolation, and MCP integration.
    adoption_process: >-
      Study the canonical root-level s01-s20 track, extract one mechanism at a time,
      rewrite it against BD-specific contracts, add deterministic validation, provenance,
      observability, security controls, tests, and human approval before adoption.
    integration_rule: >-
      Treat the repository as teaching code and an architectural reference, not as Claude Code
      source code or a production-ready runtime. Reuse concepts selectively behind stable BD
      capability APIs and governed workflow boundaries; do not copy s20 directly into production.
    not_for: production_runtime_security_sandbox_or_unreviewed_drop_in_framework