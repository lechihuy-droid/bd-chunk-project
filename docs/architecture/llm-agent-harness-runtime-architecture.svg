<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">AI Harness - LLM Agent Runtime Architecture</title>
  <desc id="desc">System architecture diagram showing an AI harness with interface layer, data ingestion, orchestrator runtime, prompt creator skill, specialist agents, tool layer, LLM provider layer, evaluator, human review gate, observability, and final deliverables.</desc>
  <defs>
    <style>
      .bg { fill: #f7fbff; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Arial, Helvetica, sans-serif; fill: #334155; }
      .section-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small-title { font: 700 14px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 500 13px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 500 11px Arial, Helvetica, sans-serif; fill: #334155; }
      .tiny { font: 500 10px Arial, Helvetica, sans-serif; fill: #475569; }
      .box { stroke-width: 1.6; rx: 14; ry: 14; }
      .mini { stroke-width: 1.3; rx: 10; ry: 10; }
      .line { stroke: #111827; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .data { stroke: #2563eb; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrowBlue); }
      .warn { stroke: #f97316; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrowOrange); }
      .ok { stroke: #16a34a; stroke-width: 2; fill: none; marker-end: url(#arrowGreen); }
      .shadow { filter: drop-shadow(0 2px 4px rgba(15,23,42,.10)); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/></marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1120"/>
  <text class="title" x="42" y="58">AI HARNESS — LLM AGENT RUNTIME ARCHITECTURE</text>
  <text class="subtitle" x="42" y="86">LLM is the reasoning engine. The Harness Runtime orchestrates workflow, state, tools, evaluation, and human gates.</text>

  <g transform="translate(1315,42)">
    <line class="line" x1="0" y1="0" x2="70" y2="0"/>
    <text class="small" x="85" y="5">Control / Orchestration</text>
    <line class="data" x1="0" y1="30" x2="70" y2="30"/>
    <text class="small" x="85" y="35">Data / Context</text>
  </g>

  <!-- Top layer -->
  <rect class="box shadow" x="28" y="115" width="420" height="130" fill="#eef6ff" stroke="#2563eb"/>
  <text class="section-title" x="48" y="145">1. USERS / STAKEHOLDERS</text>
  <g transform="translate(62,166)">
    <circle cx="28" cy="18" r="14" fill="#fff" stroke="#0f172a"/>
    <path d="M 6 64 C 8 42 48 42 50 64" fill="#fff" stroke="#0f172a" stroke-width="2"/>
    <text class="small" x="0" y="92">BA / PM</text>
  </g>
  <g transform="translate(165,166)">
    <circle cx="28" cy="18" r="14" fill="#fff" stroke="#0f172a"/>
    <path d="M 6 64 C 8 42 48 42 50 64" fill="#fff" stroke="#0f172a" stroke-width="2"/>
    <text class="small" x="0" y="92">Developer</text>
  </g>
  <g transform="translate(285,166)">
    <circle cx="28" cy="18" r="14" fill="#fff" stroke="#0f172a"/>
    <path d="M 6 64 C 8 42 48 42 50 64" fill="#fff" stroke="#0f172a" stroke-width="2"/>
    <text class="small" x="2" y="92">Reviewer</text>
  </g>

  <rect class="box shadow" x="490" y="115" width="1280" height="130" fill="#eef6ff" stroke="#2563eb"/>
  <text class="section-title" x="720" y="145">2. HARNESS INTERFACE LAYER</text>
  <g transform="translate(530,170)">
    <rect class="mini" x="0" y="0" width="150" height="52" fill="#fff" stroke="#60a5fa"/><text class="label" x="44" y="31">Chat UI</text>
    <rect class="mini" x="185" y="0" width="170" height="52" fill="#fff" stroke="#60a5fa"/><text class="label" x="220" y="31">Workflow Canvas</text>
    <rect class="mini" x="390" y="0" width="170" height="52" fill="#fff" stroke="#60a5fa"/><text class="label" x="430" y="31">Document Manager</text>
    <rect class="mini" x="595" y="0" width="170" height="52" fill="#fff" stroke="#60a5fa"/><text class="label" x="630" y="31">Review Dashboard</text>
    <rect class="mini" x="800" y="0" width="170" height="52" fill="#fff" stroke="#60a5fa"/><text class="label" x="840" y="31">Agent Studio</text>
    <rect class="mini" x="1005" y="0" width="210" height="52" fill="#fff" stroke="#60a5fa"/><text class="label" x="1052" y="31">API / Webhook / CLI</text>
  </g>

  <!-- Left data -->
  <rect class="box shadow" x="28" y="280" width="185" height="570" fill="#f0fdf4" stroke="#16a34a"/>
  <text class="section-title" x="48" y="312">3. DATA SOURCES</text>
  <g transform="translate(48,344)">
    <rect class="mini" x="0" y="0" width="145" height="47" fill="#fff" stroke="#86efac"/><text class="label" x="23" y="29">RD / 要件定義書</text>
    <rect class="mini" x="0" y="65" width="145" height="47" fill="#fff" stroke="#86efac"/><text class="label" x="23" y="94">QA / 確認事項</text>
    <rect class="mini" x="0" y="130" width="145" height="47" fill="#fff" stroke="#86efac"/><text class="label" x="23" y="159">Meeting Notes</text>
    <rect class="mini" x="0" y="195" width="145" height="47" fill="#fff" stroke="#86efac"/><text class="label" x="23" y="224">Excel / Sheets</text>
    <rect class="mini" x="0" y="260" width="145" height="47" fill="#fff" stroke="#86efac"/><text class="label" x="23" y="289">Codebase</text>
    <rect class="mini" x="0" y="325" width="145" height="47" fill="#fff" stroke="#86efac"/><text class="label" x="23" y="354">Standards</text>
    <rect class="mini" x="0" y="390" width="145" height="47" fill="#fff" stroke="#86efac"/><text class="label" x="23" y="419">Past Projects</text>
  </g>

  <rect class="box shadow" x="245" y="280" width="200" height="570" fill="#f0fdf4" stroke="#16a34a"/>
  <text class="section-title" x="265" y="312">4. INGESTION</text>
  <g transform="translate(270,344)">
    <rect class="mini" x="0" y="0" width="150" height="48" fill="#fff" stroke="#86efac"/><text class="label" x="28" y="29">Ingestion</text>
    <line class="line" x1="75" y1="55" x2="75" y2="88"/>
    <rect class="mini" x="0" y="95" width="150" height="48" fill="#fff" stroke="#86efac"/><text class="label" x="19" y="124">Parse / Extract</text>
    <line class="line" x1="75" y1="150" x2="75" y2="183"/>
    <rect class="mini" x="0" y="190" width="150" height="56" fill="#fff" stroke="#86efac"/><text class="label" x="17" y="214">Chunk + Label</text><text class="tiny" x="28" y="233">RD_FACT / QA</text>
    <line class="line" x1="75" y1="253" x2="75" y2="286"/>
    <rect class="mini" x="0" y="295" width="150" height="48" fill="#fff" stroke="#86efac"/><text class="label" x="35" y="324">Indexing</text>
  </g>

  <!-- Runtime core -->
  <rect class="box shadow" x="470" y="280" width="1045" height="570" fill="#eff6ff" stroke="#2563eb"/>
  <text class="section-title" x="760" y="312">5. AGENT RUNTIME — ORCHESTRATOR CORE</text>

  <rect class="box" x="500" y="330" width="500" height="140" fill="#ffffff" stroke="#93c5fd"/>
  <text class="small-title" x="520" y="360">5.1 Orchestrator Runtime</text>
  <g transform="translate(530,382)">
    <rect class="mini" x="0" y="0" width="85" height="54" fill="#f8fafc" stroke="#bfdbfe"/><text class="tiny" x="17" y="24">Task</text><text class="tiny" x="3" y="39">Decompose</text>
    <rect class="mini" x="105" y="0" width="85" height="54" fill="#f8fafc" stroke="#bfdbfe"/><text class="tiny" x="22" y="24">Agent</text><text class="tiny" x="20" y="39">Routing</text>
    <rect class="mini" x="210" y="0" width="85" height="54" fill="#f8fafc" stroke="#bfdbfe"/><text class="tiny" x="20" y="24">Context</text><text class="tiny" x="18" y="39">Assembly</text>
    <rect class="mini" x="315" y="0" width="85" height="54" fill="#f8fafc" stroke="#bfdbfe"/><text class="tiny" x="25" y="24">State</text><text class="tiny" x="10" y="39">Management</text>
  </g>

  <rect class="box" x="1035" y="330" width="300" height="140" fill="#ffffff" stroke="#93c5fd"/>
  <text class="small-title" x="1055" y="360">5.2 State &amp; Memory</text>
  <text class="label" x="1070" y="390">• Task state store</text>
  <text class="label" x="1070" y="417">• Agent ledger</text>
  <text class="label" x="1070" y="444">• Checkpoints</text>

  <rect class="box" x="500" y="505" width="560" height="110" fill="#faf5ff" stroke="#a855f7"/>
  <text class="small-title" x="520" y="535">5.3 Prompt Creator Skill — builds handoff prompt / task contract</text>
  <g transform="translate(530,555)">
    <rect class="mini" x="0" y="0" width="92" height="38" fill="#fff" stroke="#c084fc"/><text class="tiny" x="14" y="24">Intent</text>
    <rect class="mini" x="112" y="0" width="92" height="38" fill="#fff" stroke="#c084fc"/><text class="tiny" x="13" y="24">Context</text>
    <rect class="mini" x="224" y="0" width="92" height="38" fill="#fff" stroke="#c084fc"/><text class="tiny" x="7" y="24">Prompt</text>
    <rect class="mini" x="336" y="0" width="92" height="38" fill="#fff" stroke="#c084fc"/><text class="tiny" x="12" y="24">Guardrails</text>
    <rect class="mini" x="448" y="0" width="92" height="38" fill="#fff" stroke="#c084fc"/><text class="tiny" x="15" y="24">Schema</text>
  </g>

  <rect class="box" x="500" y="645" width="640" height="160" fill="#ffffff" stroke="#60a5fa"/>
  <text class="small-title" x="520" y="675">5.4 Agent Registry — Specialist Agents</text>
  <g transform="translate(525,698)">
    <rect class="mini" x="0" y="0" width="90" height="72" fill="#f8fafc" stroke="#93c5fd"/><text class="tiny" x="9" y="30">Requirement</text><text class="tiny" x="17" y="47">Extractor</text>
    <rect class="mini" x="108" y="0" width="90" height="72" fill="#f8fafc" stroke="#93c5fd"/><text class="tiny" x="18" y="30">BD Mapper</text><text class="tiny" x="30" y="47">Agent</text>
    <rect class="mini" x="216" y="0" width="90" height="72" fill="#f8fafc" stroke="#93c5fd"/><text class="tiny" x="11" y="30">Screen Design</text><text class="tiny" x="30" y="47">Agent</text>
    <rect class="mini" x="324" y="0" width="90" height="72" fill="#f8fafc" stroke="#93c5fd"/><text class="tiny" x="18" y="30">API / DB</text><text class="tiny" x="18" y="47">Design</text>
    <rect class="mini" x="432" y="0" width="90" height="72" fill="#f8fafc" stroke="#93c5fd"/><text class="tiny" x="11" y="30">Traceability</text><text class="tiny" x="17" y="47">Reviewer</text>
    <rect class="mini" x="540" y="0" width="90" height="72" fill="#f8fafc" stroke="#93c5fd"/><text class="tiny" x="14" y="30">JP Polisher</text><text class="tiny" x="30" y="47">Agent</text>
  </g>

  <rect class="box" x="1170" y="505" width="240" height="270" fill="#faf5ff" stroke="#a855f7"/>
  <text class="small-title" x="1200" y="535">5.5 Evaluator / Guardrail</text>
  <text class="label" x="1198" y="570">• Schema validation</text>
  <text class="label" x="1198" y="600">• Traceability check</text>
  <text class="label" x="1198" y="630">• Quality / risk check</text>
  <text class="label" x="1198" y="660">• Hallucination guard</text>
  <text class="label" x="1198" y="690">• Confidence scoring</text>
  <text class="label" x="1198" y="720">• Policy / rule check</text>
  <path d="M1290 750 L1330 790 L1290 830 L1250 790 Z" fill="#fff" stroke="#a855f7"/>
  <text class="label" x="1272" y="795">Pass?</text>

  <rect class="box" x="1380" y="585" width="115" height="72" fill="#fff1f2" stroke="#ef4444"/>
  <text class="label" x="1404" y="616">Retry /</text><text class="label" x="1400" y="637">Repair</text>
  <line class="warn" x1="1330" y1="790" x2="1440" y2="660"/>

  <!-- Tools -->
  <rect class="box shadow" x="330" y="875" width="780" height="100" fill="#f0fdf4" stroke="#16a34a"/>
  <text class="section-title" x="620" y="904">6. TOOL LAYER / MCP</text>
  <g transform="translate(365,925)">
    <rect class="mini" x="0" y="0" width="82" height="38" fill="#fff" stroke="#86efac"/><text class="tiny" x="14" y="24">File Reader</text>
    <rect class="mini" x="96" y="0" width="82" height="38" fill="#fff" stroke="#86efac"/><text class="tiny" x="10" y="24">Excel Parser</text>
    <rect class="mini" x="192" y="0" width="82" height="38" fill="#fff" stroke="#86efac"/><text class="tiny" x="22" y="24">GitHub</text>
    <rect class="mini" x="288" y="0" width="82" height="38" fill="#fff" stroke="#86efac"/><text class="tiny" x="10" y="24">Web Search</text>
    <rect class="mini" x="384" y="0" width="82" height="38" fill="#fff" stroke="#86efac"/><text class="tiny" x="14" y="24">Vector DB</text>
    <rect class="mini" x="480" y="0" width="82" height="38" fill="#fff" stroke="#86efac"/><text class="tiny" x="12" y="24">Database</text>
    <rect class="mini" x="576" y="0" width="82" height="38" fill="#fff" stroke="#86efac"/><text class="tiny" x="10" y="24">Code Exec</text>
    <rect class="mini" x="672" y="0" width="82" height="38" fill="#fff" stroke="#86efac"/><text class="tiny" x="18" y="24">Other</text>
  </g>

  <!-- LLM layer -->
  <rect class="box shadow" x="245" y="995" width="1050" height="95" fill="#faf5ff" stroke="#7c3aed"/>
  <text class="section-title" x="600" y="1024">7. LLM LAYER — MODEL ROUTER &amp; PROVIDERS</text>
  <rect class="mini" x="275" y="1040" width="220" height="34" fill="#fff" stroke="#c084fc"/><text class="tiny" x="310" y="1062">Model selection: cost / latency / risk</text>
  <rect class="mini" x="520" y="1040" width="150" height="34" fill="#fff" stroke="#c084fc"/><text class="tiny" x="560" y="1062">Claude</text>
  <rect class="mini" x="690" y="1040" width="150" height="34" fill="#fff" stroke="#c084fc"/><text class="tiny" x="733" y="1062">OpenAI</text>
  <rect class="mini" x="860" y="1040" width="150" height="34" fill="#fff" stroke="#c084fc"/><text class="tiny" x="900" y="1062">Gemini</text>
  <rect class="mini" x="1030" y="1040" width="220" height="34" fill="#fff" stroke="#c084fc"/><text class="tiny" x="1082" y="1062">Local / Other models</text>

  <!-- Right monitoring -->
  <rect class="box shadow" x="1545" y="280" width="225" height="570" fill="#fff7ed" stroke="#f97316"/>
  <text class="section-title" x="1570" y="312">8. OBSERVABILITY</text>
  <text class="label" x="1570" y="365">• Run / trace logs</text>
  <text class="label" x="1570" y="405">• Token / cost logs</text>
  <text class="label" x="1570" y="445">• Tool call logs</text>
  <text class="label" x="1570" y="485">• Agent output history</text>
  <text class="label" x="1570" y="525">• Error tracking</text>
  <text class="label" x="1570" y="565">• Evaluation reports</text>
  <text class="label" x="1570" y="605">• Audit trail</text>

  <!-- Outputs -->
  <rect class="box shadow" x="1340" y="875" width="430" height="215" fill="#eff6ff" stroke="#2563eb"/>
  <text class="section-title" x="1370" y="908">9. OUTPUTS &amp; DELIVERABLES</text>
  <text class="label" x="1370" y="945">• Basic Design Documents</text>
  <text class="small" x="1390" y="966">画面設計 / API設計 / DB設計 / IF...</text>
  <text class="label" x="1370" y="1000">• Review reports / traceability matrix</text>
  <text class="label" x="1370" y="1032">• Clarification questions</text>
  <text class="label" x="1370" y="1064">• Exports: Excel / JSON / Markdown / PDF</text>

  <!-- Human gate -->
  <rect class="box shadow" x="1390" y="735" width="205" height="78" fill="#fff7ed" stroke="#f97316"/>
  <text class="label" x="1425" y="768">Human-in-the-loop</text>
  <text class="label" x="1445" y="792">Review Gate</text>

  <!-- Edges -->
  <line class="line" x1="448" y1="180" x2="490" y2="180"/>
  <line class="line" x1="1130" y1="245" x2="1130" y2="330"/>
  <line class="line" x1="213" y1="565" x2="245" y2="565"/>
  <line class="data" x1="445" y1="565" x2="500" y2="565"/>
  <line class="line" x1="750" y1="470" x2="750" y2="505"/>
  <line class="line" x1="780" y1="615" x2="780" y2="645"/>
  <line class="data" x1="820" y1="805" x2="820" y2="875"/>
  <line class="data" x1="770" y1="975" x2="770" y2="995"/>
  <line class="line" x1="1000" y1="400" x2="1035" y2="400"/>
  <line class="line" x1="1185" y1="470" x2="1185" y2="505"/>
  <line class="ok" x1="1290" y1="830" x2="1340" y2="940"/>
  <line class="warn" x1="1330" y1="790" x2="1390" y2="775"/>
  <line class="warn" x1="1515" y1="400" x2="1545" y2="400"/>
  <line class="warn" x1="1515" y1="620" x2="1545" y2="620"/>

  <!-- Bottom legend -->
  <rect class="box" x="28" y="995" width="195" height="95" fill="#fff" stroke="#cbd5e1"/>
  <text class="small-title" x="48" y="1022">Legend</text>
  <line class="line" x1="48" y1="1045" x2="100" y2="1045"/>
  <text class="tiny" x="112" y="1049">control flow</text>
  <line class="data" x1="48" y1="1070" x2="100" y2="1070"/>
  <text class="tiny" x="112" y="1074">data flow</text>
</svg>
